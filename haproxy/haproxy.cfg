global
    log stdout format raw local0
    maxconn 1024

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout tunnel  3600s

frontend https_front
    bind *:443 ssl crt /certs/haproxy.pem

    acl is_websocket path_beg /ws
    use_backend ws_backend if is_websocket
    default_backend app_backend

backend app_backend
    server app app:3000 check

backend ws_backend
    option http-server-close
    option forwardfor
    server ws host.docker.internal:3001 check
