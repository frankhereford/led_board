services:
  app:
    build:
      context: ./led_ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: wss://led-board.frankhereford.com/ws
    restart: unless-stopped
    environment:
      REDIS_URL: redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"

  certbot:
    image: certbot/dns-route53
    env_file:
      - .aws.credentials
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
    command: >
      certonly --dns-route53
      -d led-board.frankhereford.com
      --agree-tos
      --email frank@frankhereford.com
      --non-interactive
      --keep-until-expiring

  haproxy:
    image: haproxy:lts-alpine
    user: root
    restart: unless-stopped
    ports:
      - "17443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - ./certs/haproxy:/certs
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      app:
        condition: service_started
      certbot:
        condition: service_completed_successfully
